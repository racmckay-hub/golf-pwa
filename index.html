<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Golf Analyzer">
    <title>Golf Swing Analyzer</title> 
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a5d1a 0%, #0d3d0d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #2c5f2d;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #4CAF50;
            background: #f9f9f9;
        }
        
        .upload-area.drag-over {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: #2c5f2d;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #1d401d;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .result {
            display: none;
            margin-top: 20px;
        }
        
        .score {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #2c5f2d, #1d401d);
            color: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: bold;
        }
        
        .grade {
            font-size: 24px;
            margin-top: 5px;
        }
        
        .metric {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .metric-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .metric-values {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .your-value {
            color: #2196F3;
        }
        
        .pro-value {
            color: #f44336;
        }
        
        .recommendation {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .video-preview {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }
        
        video {
            width: 100%;
            border-radius: 10px;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        
        .auth-section {
            display: none;
        }
        
        .logout-btn {
            background: #f44336;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏌️ Golf Swing Analyzer</h1>
            <p>Compare your swing to the pros</p>
        </div>
        
        <!-- Auth Section -->
        <div class="card auth-section" id="loginSection">
            <h2>Login / Sign Up</h2>
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn" onclick="register()">Sign Up (Free)</button>
        </div>
        
        <!-- Main App Section (shown after login) -->
        <div id="appSection" style="display: none;">
            <div class="card">
                <h2>1. Select Professional</h2>
                <select id="proSelect">
                    <option value="rory_mcilroy">Rory McIlroy - 4x Major Champion</option>
                    <option value="tiger_woods">Tiger Woods - 15x Major Champion</option>
                    <option value="justin_thomas">Justin Thomas - 2x Major Champion</option>
                </select>
            </div>
            
            <div class="card">
                <h2>2. Upload Your Swing</h2>
                <div class="upload-area" id="uploadArea">
                    📹 Tap to select or drag video here
                    <input type="file" id="videoInput" accept="video/*" style="display: none;">
                </div>
                <div id="videoPreview" class="video-preview"></div>
                <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">🔍 Analyze Swing</button>
            </div>
            
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>Analyzing your swing with AI...</p>
            </div>
            
            <div id="results" class="result"></div>
            
            <div class="card">
                <button class="btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        // API URL - Your Hetzner Server
        const API_URL = 'https://golfanalyzer.duckdns.org';
        let authToken = null;
        
        // Check if user is logged in
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (token) {
                authToken = token;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('appSection').style.display = 'none';
            }
        }
        
        // Register function
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showStatus('Please enter email and password', 'error');
                return;
            }
            
            showStatus('Creating account...', 'success');
            
            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('userId', data.user_id);
                    showStatus('Account created! Logged in.', 'success');
                    checkAuth();
                } else {
                    showStatus(data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showStatus('Network error. Please try again.', 'error');
            }
        }
        
        // Login function
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showStatus('Please enter email and password', 'error');
                return;
            }
            
            showStatus('Logging in...', 'success');
            
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('userId', data.user_id);
                    showStatus('Logged in successfully!', 'success');
                    checkAuth();
                } else {
                    showStatus(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showStatus('Network error. Please try again.', 'error');
            }
        }
        
        // Logout function
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userId');
            authToken = null;
            checkAuth();
            showStatus('Logged out', 'success');
        }
        
        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.className = 'status';
            }, 5000);
        }
        
        // File upload handling
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => {
            videoInput.click();
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleFile(file);
            }
        });
        
        videoInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            selectedFile = file;
            const preview = document.getElementById('videoPreview');
            preview.innerHTML = `
                <video controls>
                    <source src="${URL.createObjectURL(file)}" type="${file.type}">
                </video>
            `;
            showStatus(`Selected: ${file.name}`, 'success');
        }
        
        // ***** FIXED ANALYZE FUNCTION *****
        async function analyze() {
            if (!selectedFile) {
                showStatus('Please select a video first', 'error');
                return;
            }
            
            // Check if we have a token
            if (!authToken) {
                showStatus('Please login first', 'error');
                return;
            }
            
            const pro = document.getElementById('proSelect').value;
            const formData = new FormData();
            formData.append('video', selectedFile);
            formData.append('pro', pro);
            
            // Show loader
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('results').innerHTML = '';
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/api/analyze`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });
                
                // Always try to parse JSON, even if status is not OK
                let data = {};
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    console.error('Non-JSON response:', text);
                    throw new Error('Server returned invalid response');
                }
                
                console.log('📊 Analysis response:', data);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
                
                // Check for specific error cases
                if (response.status === 402) {
                    showStatus('No analyses remaining. Please upgrade to premium.', 'error');
                    return;
                }
                
                if (response.status === 401) {
                    showStatus('Session expired. Please login again.', 'error');
                    logout();
                    return;
                }
                
                if (!response.ok) {
                    const errorMsg = data.error || data.message || `Error ${response.status}`;
                    showStatus(errorMsg, 'error');
                    return;
                }
                
                // ✅ CRITICAL FIX: Check if we got valid data
                // The API returns data.score OR data.success === true
                if (data && (data.score !== undefined || data.success === true || data.overall_score !== undefined)) {
                    displayResults(data);
                    showStatus('Analysis complete!', 'success');
                } else {
                    // If we got here but no data, show the error
                    const errorMsg = data.error || data.message || 'No analysis data received. Try a different video.';
                    showStatus(errorMsg, 'error');
                }
            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
                console.error('Analyze error:', error);
                showStatus('Network error. Please try again.', 'error');
            }
        }
        
        // ***** FIXED DISPLAY RESULTS FUNCTION *****
        function displayResults(data) {
            console.log('📊 Displaying results:', data);
            const resultsDiv = document.getElementById('results');
            
            // Clear previous results
            resultsDiv.innerHTML = '';
            
            // --- SCORE SECTION ---
            const score = data.score || data.overall_score || 'N/A';
            const grade = data.grade || 'N/A';
            const scoreHtml = `
                <div class="score">
                    <div class="score-number">${score}/100</div>
                    <div class="grade">Grade: ${grade}</div>
                </div>
            `;
            
            // --- ASSESSMENT ---
            const assessmentHtml = `
                <div class="card">
                    <h2>Overall Assessment</h2>
                    <p>${data.overall_assessment || data.message || 'Analysis complete'}</p>
                </div>
            `;
            
            // --- METRICS ---
            let metricsHtml = '';
            if (data.metrics && Object.keys(data.metrics).length > 0) {
                metricsHtml = '<div class="card"><h2>Key Metrics</h2>';
                for (const [key, value] of Object.entries(data.metrics)) {
                    if (typeof value === 'object' && value !== null) {
                        const yourVal = value.your_value !== undefined ? value.your_value : 'N/A';
                        const proVal = value.pro_value !== undefined ? value.pro_value : 'N/A';
                        metricsHtml += `
                            <div class="metric">
                                <div class="metric-name">${key.replace(/_/g, ' ').toUpperCase()}</div>
                                <div class="metric-values">
                                    <span class="your-value">You: ${yourVal}°</span>
                                    <span class="pro-value">Pro: ${proVal}°</span>
                                </div>
                            </div>
                        `;
                    }
                }
                metricsHtml += '</div>';
            }
            
            // --- RECOMMENDATIONS ---
            let recommendationsHtml = '';
            if (data.recommendations && data.recommendations.length > 0) {
                recommendationsHtml = `
                    <div class="card">
                        <h3>📋 Recommendations</h3>
                        ${data.recommendations.map(rec => {
                            const text = typeof rec === 'string' ? rec : (rec.text || JSON.stringify(rec));
                            return `<div class="recommendation">${text}</div>`;
                        }).join('')}
                    </div>
                `;
            }
            
            // --- DRILLS ---
            let drillsHtml = '';
            if (data.drills && data.drills.length > 0) {
                drillsHtml = `
                    <div class="card">
                        <h2>🏋️ Recommended Drills</h2>
                        ${data.drills.map(drill => {
                            const name = drill.focus_area || drill.name || 'Drill';
                            const desc = drill.drill?.description || drill.description || '';
                            const duration = drill.drill?.duration || drill.duration || '10 min';
                            return `
                                <div class="metric">
                                    <div class="metric-name">${name}</div>
                                    <p>${desc}</p>
                                    <small>Duration: ${duration}</small>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
            
            // --- SWING THOUGHTS ---
            let thoughtsHtml = '';
            if (data.swing_thoughts && data.swing_thoughts.length > 0) {
                thoughtsHtml = `
                    <div class="card">
                        <h2>💭 Swing Thoughts</h2>
                        ${data.swing_thoughts.map(thought => `<p>${thought}</p>`).join('')}
                    </div>
                `;
            }
            
            // --- MOTIVATION ---
            let motivationalHtml = '';
            if (data.motivational_message) {
                motivationalHtml = `
                    <div class="card">
                        <h2>✨ Motivation</h2>
                        <p>${data.motivational_message}</p>
                    </div>
                `;
            }
            
            // --- ANALYSES REMAINING ---
            let remainingHtml = '';
            if (data.analyses_remaining !== undefined) {
                remainingHtml = `
                    <div class="card">
                        <p>✅ You have <strong>${data.analyses_remaining}</strong> analyses remaining</p>
                    </div>
                `;
            }
            
            // --- COMBINE EVERYTHING ---
            resultsDiv.innerHTML = `
                ${scoreHtml}
                ${assessmentHtml}
                ${metricsHtml}
                ${recommendationsHtml}
                ${drillsHtml}
                ${thoughtsHtml}
                ${motivationalHtml}
                ${remainingHtml}
            `;
            
            resultsDiv.style.display = 'block';
            
            // Show success message
            if (data.analyses_remaining !== undefined) {
                showStatus(`Analysis complete! You have ${data.analyses_remaining} analyses remaining`, 'success');
            } else {
                showStatus('Analysis complete!', 'success');
            }
        }
        
        // Initialize on page load
        checkAuth();
        
        // Load pros list
        async function loadPros() {
            try {
                const response = await fetch(`${API_URL}/api/pros`);
                if (!response.ok) throw new Error('Failed to load pros');
                const pros = await response.json();
                const select = document.getElementById('proSelect');
                if (pros && pros.length > 0) {
                    select.innerHTML = pros.map(pro => 
                        `<option value="${pro.id}">${pro.name} - ${pro.description || ''}</option>`
                    ).join('');
                }
            } catch (error) {
                console.error('Failed to load pros:', error);
                // Keep default options if API fails
            }
        }
        loadPros();
    </script>
</body>
</html>
